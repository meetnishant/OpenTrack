version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: opentrack-db
    environment:
      POSTGRES_USER: opentrack
      POSTGRES_PASSWORD: opentrack_password
      POSTGRES_DB: opentrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
